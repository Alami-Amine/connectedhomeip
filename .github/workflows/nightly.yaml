name: Daily Run for slow tests
on:
    schedule:
      - cron: '0 0 * * *'
# --- TEST SECTION: Uncomment below to test on PRs ---
    # push:
    #     branches:
    #         - master
    #         - 'v*-branch'
    # pull_request:
    # merge_group:
# --- END TEST SECTION ---
    workflow_dispatch:
        inputs:
            disable_ccache:
                description: 'Disable ccache restore and builds (sets CCACHE_DISABLE=1)'
                required: false
                default: 'false'
                type: choice
                options: ['false', 'true']
            cache_suffix:
                description: 'Optional suffix appended to ccache key to rotate (e.g. short hash)'
                required: false
                default: ''
                type: string

concurrency:
    group: ${{ github.ref }}-${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.number) || (github.event_name == 'workflow_dispatch' && github.run_number) || github.sha }}
    cancel-in-progress: true

env:
    CHIP_NO_LOG_TIMESTAMPS: true

jobs:
    # --- FAKE TEST JOB FOR REPORT TESTING (replaces build + run) ---
    su_repl_tests_linux_run:
        name: Software Update REPL Tests - Fake (RUN)
        if: github.actor != 'restyled-io[bot]'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                filter: ["TC_SU_2_5", "TC_SU_2_7"]
        steps:
            - name: Generate fake JUnit XML
              run: |
                  mkdir -p out/junit-results
                  if [ "${{ matrix.filter }}" = "TC_SU_2_5" ]; then
                    cat > out/junit-results/${{ matrix.filter }}-results.xml <<'XMLEOF'
                  <?xml version="1.0" encoding="UTF-8"?>
                  <testsuites>
                    <testsuite name="Nightly CI Tests" tests="2" failures="1" errors="0" time="10.5">
                      <testcase name="TC_SU_2_5_test_pass" classname="TC_SU_2_5" time="5.0"/>
                      <testcase name="TC_SU_2_5_test_fail" classname="TC_SU_2_5" time="5.5">
                        <failure message="Fake failure for testing">This is a fake failure to test the reporting pipeline.</failure>
                      </testcase>
                    </testsuite>
                  </testsuites>
                  XMLEOF
                  else
                    cat > out/junit-results/${{ matrix.filter }}-results.xml <<'XMLEOF'
                  <?xml version="1.0" encoding="UTF-8"?>
                  <testsuites>
                    <testsuite name="Nightly CI Tests" tests="1" failures="0" errors="0" time="3.2">
                      <testcase name="TC_SU_2_7_test_pass" classname="TC_SU_2_7" time="3.2"/>
                    </testsuite>
                  </testsuites>
                  XMLEOF
                  fi

            - name: Upload JUnit XML Results
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: junit-results-${{ matrix.filter }}
                  path: out/junit-results/${{ matrix.filter }}-results.xml
                  retention-days: 30
                  if-no-files-found: warn

    su_repl_tests_report:
        name: Software Update REPL Tests - Test Report
        needs: su_repl_tests_linux_run
        if: ${{ !cancelled() && github.actor != 'restyled-io[bot]' }}

        runs-on: ubuntu-latest
        permissions:
            contents: write
            checks: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download all JUnit XML results
              uses: actions/download-artifact@v4
              with:
                  pattern: junit-results-*
                  path: junit-results
                  merge-multiple: true

            - name: Publish test results to GitHub Actions
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: junit-results/**/*.xml
                  detailed_summary: true
                  require_tests: false

            - name: Checkout gh-pages for Allure history
              uses: actions/checkout@v6
              with:
                  ref: gh-pages
                  path: gh-pages

            - name: Add executor info
              run: |
                  cat <<EOF > junit-results/executor.json
                  {
                    "name": "GitHub Actions",
                    "type": "github",
                    "buildName": "#${{ github.run_number }} (${{ github.ref_name }}, $(date -u +%Y-%m-%d))",
                    "buildOrder": ${{ github.run_number }},
                    "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "reportName": "Nightly CI - #${{ github.run_number }} (${{ github.ref_name }})"
                  }
                  EOF
                  cat junit-results/executor.json

            - name: Generate Allure Report
              uses: simple-elf/allure-report-action@v1.13
              with:
                  allure_results: junit-results
                  allure_report: allure-report
                  gh_pages: gh-pages
                  allure_history: allure-history
                  subfolder: allure-report
                  keep_reports: 30

            - name: Upload Allure Report
              uses: actions/upload-artifact@v7
              with:
                  name: allure-report-su-repl
                  path: allure-report
                  retention-days: 30
                  if-no-files-found: warn

            - name: Deploy to GitHub Pages
              if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: allure-history/allure-report
                  destination_dir: allure-report
                  keep_files: true
