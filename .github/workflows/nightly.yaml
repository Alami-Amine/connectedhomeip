name: Daily Run for slow tests
on:
    schedule:
      - cron: '0 0 * * *'
# --- TEST SECTION: Uncomment below to test on PRs ---
    # push:
    #     branches:
    #         - master
    #         - 'v*-branch'
    # pull_request:
    # merge_group:
# --- END TEST SECTION ---
    workflow_dispatch:
        inputs:
            disable_ccache:
                description: 'Disable ccache restore and builds (sets CCACHE_DISABLE=1)'
                required: false
                default: 'false'
                type: choice
                options: ['false', 'true']
            cache_suffix:
                description: 'Optional suffix appended to ccache key to rotate (e.g. short hash)'
                required: false
                default: ''
                type: string

concurrency:
    group: ${{ github.ref }}-${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.number) || (github.event_name == 'workflow_dispatch' && github.run_number) || github.sha }}
    cancel-in-progress: true

env:
    CHIP_NO_LOG_TIMESTAMPS: true

jobs:
    # --- FAKE TEST JOB FOR REPORT TESTING (replaces build + run) ---
    su_repl_tests_linux_run:
        name: Software Update REPL Tests - Fake (RUN)
        if: github.actor != 'restyled-io[bot]'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                filter: ["TC_SU_2_5", "TC_SU_2_7"]
        steps:
            - name: Generate fake JUnit XML
              run: |
                  mkdir -p out/junit-results
                  TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S)
                  if [ "${{ matrix.filter }}" = "TC_SU_2_5" ]; then
                    cat > out/junit-results/${{ matrix.filter }}-results.xml <<XMLEOF
                  <?xml version="1.0" encoding="UTF-8"?>
                  <testsuites>
                    <testsuite name="Nightly CI Tests" tests="2" failures="1" errors="0" time="10.5" timestamp="${TIMESTAMP}">
                      <testcase name="TC_SU_2_5_test_pass" classname="TC_SU_2_5" time="5.0"/>
                      <testcase name="TC_SU_2_5_test_fail" classname="TC_SU_2_5" time="5.5">
                        <failure message="Fake failure for testing">This is a fake failure to test the reporting pipeline.</failure>
                      </testcase>
                    </testsuite>
                  </testsuites>
                  XMLEOF
                  else
                    cat > out/junit-results/${{ matrix.filter }}-results.xml <<XMLEOF
                  <?xml version="1.0" encoding="UTF-8"?>
                  <testsuites>
                    <testsuite name="Nightly CI Tests" tests="1" failures="0" errors="0" time="3.2" timestamp="${TIMESTAMP}">
                      <testcase name="TC_SU_2_7_test_pass" classname="TC_SU_2_7" time="3.2"/>
                    </testsuite>
                  </testsuites>
                  XMLEOF
                  fi

            - name: Upload JUnit XML Results
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: junit-results-${{ matrix.filter }}
                  path: out/junit-results/${{ matrix.filter }}-results.xml
                  retention-days: 30
                  if-no-files-found: warn

    su_repl_tests_report:
        name: Software Update REPL Tests - Test Report
        needs: su_repl_tests_linux_run
        if: ${{ !cancelled() && github.actor != 'restyled-io[bot]' }}

        runs-on: ubuntu-latest
        permissions:
            contents: write
            checks: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download all JUnit XML results
              uses: actions/download-artifact@v4
              with:
                  pattern: junit-results-*
                  path: junit-results
                  merge-multiple: true

            - name: Publish test results to GitHub Actions
              uses: mikepenz/action-junit-report@v5
              with:
                  report_paths: junit-results/**/*.xml
                  detailed_summary: true
                  require_tests: false

            - name: Checkout gh-pages for Allure history
              uses: actions/checkout@v6
              with:
                  ref: gh-pages
                  path: gh-pages

            - name: Install Allure CLI
              run: npm install -g allure-commandline

            - name: Prepare Allure results
              run: |
                  # Copy history from previous gh-pages deploy
                  echo "=== gh-pages/allure-report contents ==="
                  ls -la gh-pages/allure-report/ 2>/dev/null || echo "no allure-report dir"
                  echo "=== gh-pages/allure-report/last-history contents ==="
                  ls -la gh-pages/allure-report/last-history/ 2>/dev/null || echo "no last-history dir"
                  mkdir -p junit-results/history
                  cp -r gh-pages/allure-report/last-history/. junit-results/history 2>/dev/null || true
                  echo "=== junit-results/history contents ==="
                  ls -la junit-results/history/ 2>/dev/null || echo "no history copied"

                  # Write executor info
                  CURRENT_DATE=$(date -u +%Y-%m-%d)
                  PAGES_URL="https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}/allure-report"
                  cat <<EOF > junit-results/executor.json
                  {
                    "name": "GitHub Actions",
                    "type": "github",
                    "buildName": "#${{ github.run_number }} (${{ github.ref_name }}, ${CURRENT_DATE})",
                    "buildOrder": ${{ github.run_number }},
                    "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "reportName": "Nightly CI Tests",
                    "url": "${PAGES_URL}",
                    "reportUrl": "${PAGES_URL}/${{ github.run_number }}"
                  }
                  EOF

            - name: Generate Allure Report
              run: allure generate junit-results -o allure-report --clean

            - name: Prepare deploy directory
              run: |
                  mkdir -p allure-deploy/allure-report
                  # Copy report as numbered archive
                  cp -r allure-report allure-deploy/allure-report/${{ github.run_number }}
                  # Save history for next run
                  cp -r allure-report/history allure-deploy/allure-report/last-history
                  # Redirect index to latest report
                  echo '<!DOCTYPE html><meta charset="utf-8"><meta http-equiv="refresh" content="0; URL=${{ github.run_number }}/index.html">' > allure-deploy/allure-report/index.html

            - name: Upload Allure Report
              uses: actions/upload-artifact@v7
              with:
                  name: allure-report-su-repl
                  path: allure-report
                  retention-days: 30
                  if-no-files-found: warn

            - name: Deploy to GitHub Pages
              if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: allure-deploy/allure-report
                  destination_dir: allure-report
                  keep_files: true
